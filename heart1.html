<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Heart with Name</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <audio id="bgm" loop>
  <source src="a.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("click", () => {
  const music = document.getElementById("bgm");
  music.play();
}, { once: true });
</script>
<canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const heartWords = "ILoveYou"; 
    const centerName = "MaMa"; 
    const heartParticles = [];

    function initHeart() {
        // t += 0.08 ဆိုတာ စာသားတွေကို ပိုစိပ်သွားအောင် လုပ်ထားတာပါ
        for (let t = 0; t < Math.PI * 2; t += 0.08) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            
            heartParticles.push({
                baseX: x,
                baseY: y,
                randomOffset: Math.random() * 20
            });
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        // ဒီနေရာမှာ scale ကို 9 လို့ ပြောင်းထားပါတယ် (ပိုသေးသွားအောင်)
        const scale = 13; 

        // ၁။ ပတ်ပတ်လည်က စာသားများ (နည်းနည်းသေးပေးထားတယ်)
        ctx.font = "bold 11px Arial";
        ctx.fillStyle = "white"; 
        ctx.shadowBlur = 5;
        ctx.shadowColor = "white";

        heartParticles.forEach((p) => {
            const vibration = Math.sin(Date.now() * 0.008 + p.randomOffset) * 1.5;
            const x = centerX + p.baseX * scale + vibration;
            const y = centerY + p.baseY * scale + vibration;
            ctx.fillText(heartWords, x, y);
        });

        // ၂။ အလယ်က နာမည်
        ctx.font = "bold 28px Arial, Pyidaungsu"; 
        ctx.fillStyle = "white";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "white";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        
        const centerVib = Math.sin(Date.now() * 0.005) * 3;
        ctx.fillText(centerName, centerX, centerY + centerVib);

        requestAnimationFrame(animate);
    }

    initHeart();
    animate();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>

</body>
</html>
